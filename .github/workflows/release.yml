# Release workflow: runs only on pushes to main (i.e. after a PR is merged).
#
# This workflow uses the official Changesets GitHub Action, which implements
# a two-phase release model:
#
#   PHASE 1 — "Version PR" mode
#     When there are unreleased changesets in the repo (markdown files under
#     .changeset/ that describe pending changes), the action creates or updates
#     a "Version Packages" pull request. That PR bumps package.json version
#     numbers and writes CHANGELOG.md entries based on the changeset files.
#     No publishing happens yet.
#
#   PHASE 2 — "Publish" mode
#     When the "Version Packages" PR is merged into main, the changeset files
#     are gone (they were consumed into CHANGELOG.md). The action detects this
#     and runs `changeset publish` (mapped to `npm run release`) which:
#       1. Builds the package (via the publish script in package.json)
#       2. Publishes the new version to npm using NPM_TOKEN
#       3. Creates a git tag for the release
#
# The action itself decides which phase to execute — you don't control it
# directly. The key invariant: changesets present → open/update PR;
# no changesets → publish.
#
# Why not trigger directly on ci.yml completion?
# GitHub's workflow_run trigger adds latency and complexity. Instead we rely
# on the branch protection rule requiring CI to pass before main is mergeable.
# By the time any push reaches main, CI has already passed.
name: Release

on:
  push:
    branches:
      - main   # only runs after a merge to main, not on feature branches

jobs:
  release:
    name: Release via Changesets
    runs-on: ubuntu-latest

    # These permissions are required by the Changesets action:
    #   contents: write — to push version bump commits and create git tags
    #   pull-requests: write — to open/update the "Version Packages" PR
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout source
        # Fetch full history so Changesets can read all commit messages and
        # compare versions correctly across the git graph.
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js 22 (LTS)
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          # Point npm at the public registry with the NPM_TOKEN secret so
          # `changeset publish` can authenticate when pushing the package.
          registry-url: 'https://registry.npmjs.org'

      # Cache node_modules exactly as in ci.yml so this job benefits from
      # the warm cache that CI left behind.
      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        run: npm ci

      # The Changesets action is the core of this workflow.
      #
      # It reads the .changeset/ directory and does one of two things:
      #
      #   a) If .changeset/*.md files exist (unreleased changes):
      #      → Opens or force-pushes a "Version Packages" PR that bumps
      #        versions and writes CHANGELOG entries. The PR title is
      #        "Version Packages" by default.
      #
      #   b) If no changeset files exist (the Version PR was just merged):
      #      → Runs `npm run release` (= `changeset publish`) to publish to
      #        npm and push git tags.
      #
      # GITHUB_TOKEN is available automatically from the workflow context —
      # no need to add it as a repository secret. It lets the action open PRs
      # and push commits on behalf of github-actions[bot].
      #
      # NPM_TOKEN must be added as a repository secret (Settings → Secrets →
      # Actions). It's an npm automation token (not a granular token) scoped
      # to the package namespace. It is only consumed in phase 2 (publish).
      - name: Create release PR or publish to npm
        uses: changesets/action@v1
        with:
          # The publish command maps to `changeset publish` in package.json.
          # Changesets will run this only in phase 2 (when there are no
          # pending changeset files and a version bump was already merged).
          publish: npm run release

          # Optional: customise the "Version Packages" PR title/commit so it
          # is recognisable in the PR list and git log.
          title: 'chore: version packages'
          commit: 'chore: version packages'
        env:
          # GITHUB_TOKEN — auto-injected by Actions, used to open/update the
          # "Version Packages" PR and push version bump commits.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

          # NPM_TOKEN — must be manually added as a repository secret.
          # Required only in publish phase; safe to set here because Actions
          # secrets are masked in all log output.
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
